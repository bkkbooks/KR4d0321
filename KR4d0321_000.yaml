body:
  text: 安晚堂集别集類三宋提要臣等謹案安晚堂集十二卷宋鄭清之撰清之初名燮字文叔後改今名字德源安晚其别號也鄞縣人嘉定四年進士寶慶初以定䇿功纍官太傅左丞相卒諡忠定事迹具宋史本傳所撰安晚集本六十卷宋時刋於臨安此本所存僅第六卷至第十二卷但有詩而無文較原目僅十之一考王士禎蠶尾集有安晚集跋亦稱僅古今體詩第六卷至第十二卷則康熙中巳無完本矣士禎但謂其詩多禪語而不言其工拙今觀所作大都直抒性情於白居易為近其咏梅咏雪七言歌行二十首亦頗有可觀且清之為相擢用正人時有小元祐之號在南宋中葉猶屬良臣不但其詩為足重固不容以殘缺廢也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f787b76ec468a79449b4ab83c16f2dec7c765d4f104470e05a6a9074e0399add
