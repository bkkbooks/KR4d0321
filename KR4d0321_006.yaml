body:
  text: 安晚堂集卷六宋鄭清之撰默坐偶成恆河見水老如新此見云何别妄真心本佛心須作佛境皆塵境莫隨塵空中花果浮生眼夢裏悲歡現在身萬事盧胡喫茶去不知誰主更誰賓底須莫莫更休休老去浮沈一敝舟病惱幻軀天惡劇醉尋熟睡我先籌眼前勤惰書開闔忩下陰晴雨散收假使莊生夢為蝶也應貸粟監河侯睡魔勾引鶴投林書債中拋筆似瘖尚有烏髭贏白髮擬尋朱汞養黃金寸機解起千疆畝一息能藏萬古今塵世何人是知己推忩明月正當心追憶覺際偶成我到家山雪尚飛看看寒食展歸期花開無酒蝶貽笑春盡不吟鶯有辭忩下竹君陪晤對手中杖子共追隨間來自唱無生曲井底泥蛇舞柘枝靜極磨甎豈解成明鏡打坐如何作佛身靜閙頭頭須認著暑中冰凍雪中春燈薪小草虛心不染塵傳燈會上屢焚身光明一點元無盡漫結空花作好春臂疼醫令灼艾戲成幻體當如泡影觀法身清淨本堅完四千八萬陀羅臂艾炷教君何處安食豆莢西風摵摵草蟲鳴萬莢叢中詫瑞蓂煮啖快輸兒女吻燃萁不忍尚堆青臂疼自砭雲長鑿骨未為奇斷臂亭亭對祖師萬法從心當自省箇中冷暖有魚知有感子思問學惟誠意孟氏工夫只反身定慧妙明何處覔要知儒釋共天尊秋色佳甚未能一到覺際像景漫賦二絶秋光淡薄有無間掠水斜風雨腳斑試向菰蒲深處望嫩黃一點荇花間藕花萬柄斂春粧賸駐霜荷葺芰裳水路想通漁艇入我來月下要鳴榔感風悶坐戲成六言一首示雲岑夢覺無兩莊子是非只一東坡顔淵簞食為樂啓期帶索行歌魯侯不遇天也伯寮其如命何世事如碁新局人生落葉辭柯誰人見張平叔何處覔藍采和且服單方妙藥般若波羅蜜多秋成風雨垂垂金穎賀秋成去逐狂風一羽輕何事天公惡戲劇眼前翻覆見虧盈雨後間坐偶成秋霖得晚晴景色似郊坰山向間中碧雲從闕處青簷牙抽宿溜木杪挂疏星一枕便髙卧清風入暑櫺兀坐夜聽寒蛩曉聽蟬梧桐疏雨晚秋天空齋抱膝元無事半是癡憨半是禪香山老惠兩貓殺活禪機本自由順行逆用總先籌伽黎親抱貍奴送管是南泉是趙州香山貓食粥梵宫新遣兩貍奴晨粥飢餐食肉如料是伊蒲三昧熟未知繞膝訴無魚冬瓜翦翦黃花夜後春霜皮露葉護長身生來籠統君休笑腹裏能容數百人茄子青紫皮膚類宰官光圎頭腦作僧看如何緇俗偏同嗜入口元來總一般贈李相士未遇公卿儘好看會將碧眼照人寒邯鄲夢覺君休問試卜何時可挂冠七月初五日城中大風雨颶風超海撼官城吹斷銀河徹曉傾瓦陳飛翻千鵠起屐聲旁午萬蛙鳴駢肩重足人如醉湧溜奔雲氣未平誰與箋天如帝律毒龍斥去鎖東瀛聞覺際被風寄頔老右德把茅惟蓋頭颶風飄屋等虛舟矮忩猶有蒲團滑也勝牀前衮雪毬督覺際蒔菜秋後從來數晚菘自鋤稀甲幾多叢莫辭榾榾頻攜甕凖擬清饞玉糝翁偶記賦王昭君漫録之因覽詩話中賦昭君者命意多溺於情遂出此作伐國曽聞用女戎忍留妖麗漢宫中如知褒姒貽周患須信巫臣為楚忠青冡不遺芳草恨白溝那得戰塵空解移尤物柔強虜延壽當年合議功八月初五夢桃杏枝上皆小蘂頃刻間一花先開既而次第皆拆色殊紅鮮可愛夢中為賦一詩覺但記其第二句戲足成之天孫紅錦淺深裁為惜芳苞未肯開爭奈東風披拂甚枝頭次第吐香腮贈談命陳總屬彈鋏朱門歲月過生涯安樂遍行窩談天有口機關别處世無心笑語多自是君平忠孝在其如曼倩滑稽何一帆又作鴟夷去遙想江湖聽踏歌八月上弦夕輕風尉貼晚雲開為放中秋半月來待得月圎多值雨不如今夕共樽罍覺際間坐紀所見蛛網雨中時恤緯蜂屯衙後自嬰城竹根得土筍爭長紙隙受風忩善鳴食蛤戲成滿殼濡潮汐因沙産海漘文身吳太伯緘口魯銅人雀化宜分雋蛙烹肯擬倫蛙大者名風蛤試呈叨賦手半熟酒含津督覺際植花桂後秋蘭解出奇幽香元不許春知移根好向它山覔承受風光到菊籬兄弟梅礬是水仙曝根向暖種宜先銀臺金盞惟須酒不可無渠對雪天催覺際殖芥淡交耐久最宜蔬風味清嚴莫芥如沃壤深畦須蚤計雪中滿擬飫冰葅觀書連日脾胃不快因觀書遂喜食肝脾何藥解清虛不用參苓不㕮咀一種單方無授受明忩端坐只觀書夜雨依風急雨墊秋清疏數無時總有聲最是可憐雲裏月幾番陰翳幾番明睡起戲筆范蠡功成便五湖鴟夷未了復陶朱爭如終老嚴陵釣千古清名一事無謝天童老秋蘭楚畹春曾泛曉光直留雅艷到虹藏山中不把一枝到世外那聞千佛香秋色追隨入慧光肯攜幽卉問行藏深林未省炎涼態來為間人特地香緑葉青青音菁帶紫光經有紫金光聚拈來笑處沒遮藏密圎應具楞嚴偈非木非空出妙香夜雨不睡浮沈世事付洪喬欹枕迢迢度永宵雨細無聲簷溜滴香殘有燼篆煙銷翻盆碩鼠全欺暗繞鬢飛蚊始作嬌老去易驚寒暑變幾多今夕又明朝少日無歡老易愁鶯花過眼一春休清虛未解窮聃釋情思誰能更孔周白醉暫煩簷送暖蒼顔惟恐鏡包羞爭如一點天然物不共浮生作去留育王老禪屢惠佳茗比又擕日鑄為餉因言久則味失師授以焙藏之法必有以專之笑謂非力所及漫成拙語解嘲録以為謝曽讀茶經如讀律一物不備茶不出未論煮瀹應節度第一收藏在堅密摘鮮封裹須焙芳濕蒸為寇防侵疆朝屯暮蒙要微火九轉溫養如丹房育王老慧老茶事新授祕訣乃如此幾番惠我先春芽朅來細問茶何似我初謂師茶絶奇十日之後如飲糜頗疑緇俗果異撰良苦輒為居所移吾言未終師絶叫為茶傳法恨不早綺疏應合有司存料理如前毋草草對師大笑面欲鞾三年宰相食無鮭長鬚赤腳供井臼荒寒正類山人家扊扅炊盡瓶笙吼何曾敲雪春雲走不如時扣趙州門侍者可人長摸首竹下見蘭竹下幽香秪自知孤髙終近歲寒姿垂楊曼舞多嬌態倚賴東風得幾時小軒偶成齋餘晏坐息深深萬法皆間境會心輕浪颭荷珠溜玉晴曦穿竹翠籠金岸頭舟楫人歸語檻外菰蒲鳥去音漫説陶車并謝屐如如不動勝登臨舊冬得蔞蒿數十根植之舍旁今春遂可採擷輒持餉黃堂拙語先之聊發一笑蔞蒿見録爾雅篇族譜系出荆楚堧居人采擷不論錢橫道躪轢如車前物有貴賤所遇然雞壅豕苓以帝言世間何有正味焉嗜芰昌歜性所便冰壺先生虀甕傳敢驕玉食輕膏羶天隨酷謂杞菊賢一賦金石聲相宣玉糝羮芋稱蘇仙天上酥酡能比肩憶昔客授湘湖偏乍逢此蒿日流涎嚼寒氷玉香滿咽紺滑琉璃鳴貝編糅以豚膏軟如綿脆甘豐膩潔且鮮天花石耳羞爭妍木雞退飛山之巔笑渠芽蕨成兒拳岸視橰圃眉宇軒七葅五菜誰敢先獨能兄事玉版禪一别楚産知幾年孤根朅來植鄞川春苗出土含曉煙援條小摘喜欲癲故人千里方言還調芼酌之雙觥船枯腸慰滿藜莧緣食芹而美不敢専遣送兵厨羞俎籩噴飯一笑篔簹邊太史報彗星沒老彗妖芒欲爇天王良見迫為收鞭紫微一夜璣衡轉甘雨祥風到野田安晚堂集卷六欽定四庫全書
