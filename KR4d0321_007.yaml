body:
  text: 安晚堂集卷七宋鄭清之撰謝虛齋和詩關心穡事恐春遲暫許花風入繡旗翠浪半天岐麥詠玉簪數筯刈蔞詩見山谷過土山塞詩野亭寄韻追唐什嚴鄭公有寄題野亭見杜集秋菊餐芳敵楚辭早晚催歸漢廷右西湖深處樂天碑和虛齋勸農十詩迢遞層陰曉自開仙舟花底問瀛萊文章太守非遊衍為省春耕特地來右一爇天妖焰彗初沈朝汲仁賢簡帝心未用鋒車便脂牽小須千里遍春霖右二蔽日寒雲悄欲秋仁風載路曉光浮田翁攬抱兒孫笑竹馬橫陳未肯休右三問訊桑麻真郡政按行松菊似家山挽回和氣歸田里只費齋鈴半日間右四暇日棊書六一翁錦檣絲轡與春逢年時豹尾車中望山色有無知幾重右五曉夢吟成望帝歸征鞍未許柳絲知笑聽鄮嶺春禽哢去博延英午漏遲右六酡顔醉客玉西東半濕塵衫上翠空鄒谷雖寒應解黍朱車面面是春風右七小隊旌旗半道歸松陰緩䇿攬清暉女郎未覺褰帷過笑語相教著嫁衣右八老黠山靈具六通解將蒼狗護奇峯虛齋自有青囊眼卻笑景純書未工右九恰好農時踏翠煙睡龍驚起雨公田官程便作乘間看不用扁舟學計然右十宿翠山箯輿十里見青嶄行盡松陰得翠巖萬壑聲中清磬出一峯髙處白雲緘茶新煮鼎作魚沫僧有可人能塵談自覺靈山緣境熟佛禪重問後三三暖風依日佐山行幾許春隨屐齒生溪舞緑雲苔出沒田翻翠浪麥斜橫間中適意榮三事歲晚無年式耦耕一靜可能銷幻業剩開胸次著崢嶸和葺芷應直院送秋蘭韻大椿凌千秋靈芝競三秀書傳遞誇詡垂芳古今宙貴耳但奇奇相馬失之瘦誰知楚醒花逺避漢金酎擇交得素節彼哉懷春誘夫君全德馨內美本吾有姑置芝與椿秋蘭歲相壽南坡口號十八首十日南坡兩日晴晴時不放日華明春光似妬間人占端的春風飽世情右一天工忽忽度年光料理人間富貴忙間裏何曾關造物一分風景亦收藏右二誰將春晚作冬看添著綿衣減却難道是麥寒猶未止願渠麥熟且禁寒右三休言無地起樓臺十箇花窠沒處栽東近比鄰西近水且教紅白面墻開右四欲識魚梁試作則箇切看輕拋野渌罩清寒幾回漉起空無物輸殺羣兒下釣竿右五吾宗孫子喜相過一笑檀欒似樂窩且向尊中陪北海直須間裏識南坡右六酷愛鳥鳴山更幽牆陰風雨但颼颼筠籠買得春禽語不會憂時也白頭近得白頭翁善鳴右七管絃不礙登山屐粱肉何妨滿腹書豈是清談愧夷甫為無阿堵繞吾廬右八試向青池放小鮮洋洋圉圉忽攸然校人真箇知魚樂殺活機鋒總是禪右九分席春畦僅一弓靈根移自石忩東五味子生於四明山饒渠五味誇仙藥爭似鹽梅正䇿功右十紛綸兒造信多才果解分風作去來我向南坡一旬雨春陰今曉為誰開右十一小忩白醉篆香遲只有書君伴燕頤料得人間無此樂殷勤獻與定牢辭右十二枝笻挂起一旬強剪剪春寒到柳塘白髮不公欺老我偏于間處引風霜右十三記得兒時誦古詩其甘如薺謂吾欺淡交休恨相知晚攜向晶盤笑殺伊墻根春薺怒生右十四曉來兩鵲屋南鳴報喜多應只報晴似為東皇傳好語故留勝賞到清明右十五舊日都城飫子魚一鱗今不到茅廬果然額上通三印盡去侯門代鯉書右十六安晚生涯冷似灰别墅經營半月回誇與兒郎翁驟富詩囊盈握送陳雷右十七紅紅白白共枝榮怪底山茶有寧馨倩得司花來判斷不妨一姓養螟蛉二色山茶右十八辛丑仲春同黃制屬自延壽雨過禪寂箯平聲輿掠雨到僧門帶得清間一二分素喜堂中無偃月朅來寺裏作穿雲赤心莫逆唯松友青眼相看有竹君燒葉更聨東野句紙忩鑽隙候晴曛病後和黃玉泉韻山扉連月款言巵擬共還家浣客衣愧失養生收一溉笑擒夢豎竄三危大槐安國休重省兜率陀天尚緩歸樂天詩歸則須歸兜率天一病一衰秋後雨舊語老一病一衰秋一雨一涼孰言之武老能為赤明瀹篆正恢台戲挹雄風滌悶懷病骨喜隨新籜換好詩忽餽寶珠來巨魚未縱王褒壑陋室聊淹禹錫階苔痕上階緑且共理身如理國小須握手詠康哉再和前韻為乏刀圭飲卯巵見魯直詩黃庭空想衣朱衣三田未遣三彭去九軌幾成九折危瘦骨可能支夜永醉鄉那復挽春歸亦知有客真佳甚握手還須笑樂為若時風雨候三台憂國豐年幾入懷執戟未愁方朔死間門唯喜子桑來人間宰相真如夢事見類説天上羣仙詎可階事業鏤冰何所有之乎者也矣焉哉轅門怒髮彘肩巵計相當年笑解衣誰識英雄千古意肯論性命一絲危伏波卧看飛鳶􅑁杜曲生憐獨鶴歸自愧此身成濩落空搔種種欲何為遂初雅喜賦天台墻月東邊漫古懷雖乏平原供宴樂幸尋荒徑愜歸來蹣跚愧我無金汞蹀躞看君上玉階傍舍數弓畦藥本聊支晚歲亦優哉難追八駿舉瑤巵肯向羅浮醉緑衣敝服真成原憲病枯枝幾賦仲堪危殷仲堪與客戲作危語云百歲老翁扳枯枝盲人騎馬臨深池忘憂擬問酒中聖覔句懶從天外歸笑傲桑榆知有幾春秋敢以大椿為茂先博物懵星台世味沈酣酷鴆懷風月自為無盡藏湖山誰肯愛間來競知疾下多車乘豈悟機危蹈廩階幸與樂天相伴住休論達者謂何哉病與樂天相伴住春隨樊素一齊歸送姚提幹行虛齋鎮東鄞從之南容君我初未之識雍翰傾殷勤修潔以博習秀美而有文玉犀映秋水英辭湧春雲雞距角魯蜀昂然鶴非羣晤言到聖處商也樂所聞最喜直而義壯音駴鼓鼖告子少於孟先䇿養氣勛牛山木信美謹勿容斧斤助苗固得稿可使稗不耘觀子所植立真能張吾軍仁義可效治淵源在河汾詩書自師友芝蘭足膏薰剛風接徑翮去去翔霄旻清時有聞者必也吾子云和德夫治中林宗諭雪詩簡黃制卿齋壇將禱肅熊貔一縷忱恂六出奇雲欲商量驚先路雨方收卷避催詩冰花肯斆梅糚額風絮嫌隨柳獻眉鹽虎玉龍壯語在願光逺業瑞昌時古風一篇簡徐德夫提刑昌黎有名言受恩異知己而况不識面知心詎能幾浮雲日多變交道冷如水握手遽下石利害毫髮比人情易燥濕灔澦發九軌終然風雨晦雞鳴獨無已世變方下趨特立繄君子山谷未見坡氣味已相似希文非素交永叔甘逺徙敢謂世無人前修可專美我昔聞君名恍如讀青史已乃知同時深心愛敬起端平濫持衡薦賢職當爾亟以聞九重夜半下一紙雅志樂弦歌公車猶尼止賢者固難進奪情辭詔旨知賢未及用上印返田里間居事幽屏黜陟不到耳賓朋有公言聲徽振商址入則裨國論挺挺中流砥出持皇華節光風泛桃李從容五六載平進付常理又聞交遊間榮落保終始不負楊臨賀真見其人矣夜夢加晝思髣佛眉宇紫將軍忽打門緘書照忩几風簷屢開闔襟期頓清泚有時嶧陽桐知音發妙指髙情激孤笑新思償宿喜得一夔已足失百參何恥老我豈私賀善類知有恃看君廣厦開大芘天下士簷前蜘蛛如蠶吐緯自縈纏出沒無蹤屋漏邊懷毒滿身如蝎大漫張羅網欲漫天安晚軒竹松號大夫交可絶梅為清客志相同英英鳳實卑餘子楚楚龍孫過乃翁晚際一弓櫜素月暑中千斛糶清風小軒正欲供晨坐付汝遮攔曉日東安晚堂集卷七欽定四庫全書
