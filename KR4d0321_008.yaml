body:
  text: 安晚堂集巻八宋鄭清之撰冬節沍寒約客黙坐爇品字柴作五禽戲體中差小佳園丁以矮梅至如見東郭順子使人之意也消欣然呵皸手凍筆占數語呈劉菊坡博一笑少日愛花螽趯趯老去凍蠶已休織水村山郭一枝曉忽到忩前三嘆息年年雪裏自作春摇手東皇不相識衣冠古岸綺季至介胄嶙峋亞夫色從來魏徵真嫵媚要是廣平終鐵石月香水影兒女語千古詩腸描不得笑憑與可幻竹君相對無言面深墨再和雪毛舞風學喓趯凍落天孫碎雲織玉肌不粟彭祖方戲挾奇芬笑安息生憎萬花肯同調嗤㸃壽陽聊半識結根不向青桂宫絶交月姊無難色誰能柔此老强項朝暮隆隆轉媧石春風為媒懶結子來訪苔痕娯夢得人間要覔爾許清語渠肉食乃無墨又滕六附暄􅑁寒力六花未辦天機織籬菊老盡蘭始芽淩波仙子方踵息水邊亭亭逢玉人照眼縞衣如舊識冰霜相與厲貞操蝶蜂那能汚莊色聽渠吹笛作商聲正音滿地出金石菊坡為索孤山詩好句新從座中得二君聨璧如長城笑整雲梯再攻墨牡丹驕春醉無力艶紫妖紅錦新織鹿解銜花空誤唐楚以姬歸竟亡息何如野外挺孤操照水淵然有深識昂昂雪鬢顔真卿何物女子稱國色主張去聲繁華勿復言如對雁門二千石語君欲識梅花面好向雲巖訪拾得語君欲作梅花詩磨盡蓮經大千墨菊坡筆挽千鈞力翦就氷銷出鮫織謫仙笑作揚州詩鵬賦逍遙六月息市門聊學子真隠下坐還從季野識清標自是孤山姿濫視唐家六宫色芒端琢句貌疎影竹邊著渠牛礪石枝横帶雪最佳處近水清寒月先得語梅正可兄涪翁凍雨浯溪打碑墨謝鄭廣文和韻春工漚絲呈巧力紅日如梭萬花織愛花蕩子不愛命效死驪姬似荀息草木摇落天地閉賢哉梅也衆不識靈根九轉到仙品千古離騷作書色漲晴癡暖動山意攀翻健倒蒼苔石髙標底須雪後見清芬每向閒中得花前失喜廣文詩柿葉書成㸃新墨廣文出新意得梅之全花實根葉譜入秀句輒效反騷一章東風不借半分力老樹絲窠罥寒織虚枝生白獨也正夜氣歸根吹以息箇中洒洒無一塵無眼界至無意識居然暗發定慧香不取諸相了空色若與此花論相好是人如以木鑚石吾嘗聞之老瞿曇無有少法為可得我詩當以無耳聽索梅一笑付蠅墨再和青藜不解支脚力機杼微聞隔隣織暗香來處窮幽棲蹇驢崎嶇牛喘息山中欲訪隠君子等閒未許李邕識同盟頗笑五大夫晚節汚秦有慚色摩挱寒玉古苔蘚從渠喚作荆山石雪中素隠非行怪自是花間著不得直須謫仙蘇二來溪藤快掃如鵶墨雪意賈寒欺酒力思婦懶學迴文織屏山未合篆痕銷笑倩南枝陪燕息冰紈絳蠟入纎手素臉殷跗未真識兒癡認作春風面剛道杏花欠顔色香浮紙帳夢欲醒影到忩紗月移石為梅著語將無同左袒孤山未為得呉都誇麗逸此士十年浪費老傖墨呉都賦桃松竹而不及梅和趙靜樂梅韻伊祁作春私帝力司花女課千機織月四十五以為功化工何嘗停半息老梅偃蹇傲衆芳一錢輕視程不識和羮肯為媚竈計望林秪笑欲炙色莓苔被當服文繡冰雪定交過金石靜樂先生大雅韻始信清名不虛得正須草聖傳新篇安得張顛首濡墨司寒駕天騁軌力凍合冰蠶不成織皮膚皸瘃雪滿衣真人恬漠與道息一花挺出萬木僵其友松筠乃能識清香逺到惟徳馨素質自持無異色春工著意嬪衆卉用物精多老蒼石耄紅飛盡蜜房深佳處暗為蜂翅得誰知竹外一枝好千載垂芳在詩墨菊坡疊遺梅什忽惠蘭芽此變風也敢借前韻效楚詞一章以謝來辱霜雰雰兮風乍力草變衰兮蛩罷織思秋蘭兮委蕭艾望椒丘兮聊止息悵佳人兮既逺紛吾美兮誰識忽有人兮好脩遺予佩兮春色茁瓊芽兮九畹帶杜蘅兮被石凛層冰兮峩峩杳光風兮驟得卜蘭居兮南坡拂余龜兮食墨和趙太監知宗韻萬里修程占學力色絲黄絹新組織只今下筆追二雅端如養氣閉千息公子何自知寒梅須知三長具精識亭亭玉雪瑞煙曉愛日香浮綵衣色自然雅韻出天姿芝蘭那肯羨𤣥石我慙姱節對俚語炊沙鏤氷竟何得願君寫入遂錦堂冷蘂疎枝陪淡墨再韻簡菊坡訪梅長與寒角力兩鬢絲絲尚堪織弔湘賦鵩强解事長沙少年空太息酷愛孤芳支歲寒草木雖多嬾求識肥遁不為蒼帝臣白賁丘園義形色風饕雪虐真養素笑枕溪流漱寒石請翻橘頌作梅賦倍覺風騷楚人得詩翁試為決然疑謂余非是甘飲墨昨雖移韻於蘭然石鼎聨章不可以不成也再賦一則語以殿衆作亦騷之亂詞云好惡移人信有力宫姬尚取崑崙織晉書織室崑崙奴事剛姿未必廣平愛皓首誰憐趙岐息夷車蘅茝蓀芷荃富矣離騷誇博識靈均頌橘不及梅内白孰為有精色夫何卞玉楚見棄素瑩無乃碔砆石梅古賢人又何怨伯夷正自求仁得氏以墨胎端自汚請效公輸為削墨續詩愧無脩綆力意緒中斷軻母織掉頭吟坐欲成寐出吻悲鳴方願息君愛詩梅筆不停四疊陽關人未識冰壺交映雪同調秋水為神月爭色翛然未肯弟山礬介如何必化松石詩壇置韻伯夷姓敵壘收功劇孟得須君為梅作佳傳問事𤣥㝠煩史墨再和靜樂夫君論事回天力斯文如貢厥篚織天葩瑞時來帝旁天香染衣未渠息因攜天上白琅玕散作天花天女識冰清誰似乃翁譽玉塵孩視寧馨色月中疎影射銀漢雪裏樛枝䕶磐石望林笑䇿葢世勛萬戸侯封為公得吹徹樓頭畫角春十行朝拜睿思墨靜樂用元韻為勸學之什再和士惟食志非食力於陵奚事親屨織靜樂一門自師友蕢進不為子貢息元仲季方從太丘海内人士俱願識案上惟作羽籥聲陸龜䝉室中定無鉏箒色申旦督課如園蔬子夜程書過衡石舉似翁嫗笞其兒敎育英才笑安得文獻超羣王謝家韋布當磨鐵硯墨再和梅韻北忩夢覺呼一力曙鳥微聞絡緯織推忩宛見野梅面帶雨猶如看花息堅白雅占南枝先殘紅留待北人識宫中自是憐玉奴天上何為愛藍色盧杞仙遊事肯隨蘭芷媚屈宋獨主芙蓉笑丁石愧我聨篇蟻空旋羨君六博梟已得梅嬾作尉竟仙去拜官無用斜封墨再和勸學韻仕學優於服田力公儀之家廢葵織詩書為府道徳林樂在藏修洎遊息濃薫班馬有餘香暗摸曹劉豈難識插架牙籖映隙曛近竹芸編侵晚色諸生競詫邊腹笥正音如聞孔堂石從知車馬自稽古須信熊魚可兼得四科褒進惟尚賢欽想昌黎方讀墨和葺芷雪韻冰山鑿碎五丁力散作席花誰捆織射鵰人去飛燕寒擁衾内視方閉息能令赤鳳冒白羽夜半翾翻天際識白雲鄉中助劇戲從以萬妃紛玉色鸞沼乍驚舞明鏡虎鹽未見葢危石乍離還合紛總總已定復飄如得得姑置是事先年豐有突不黔應笑墨夸父逐日有餘力驅萬白蜺飛練織連天照耀作夜明湧池培堆驚壤息竹髙已學搶頭勢梅近猶能半面識坡翁笑效六一體八章聫翩韻聲色坡效歐公白戰體以聲色氣味富貴勢利韻作八章麻衣忽見蜉蝣陣硯池觀魚來紫石鄭谷秪解瘦寒句江上漁蓑正披得何如囊錦生縠紋兎園老筆陽春墨毛東堂兎園老筆生陽春墨葩不待微和扇再和雪韻司冬已窮造父力寒機墮指曉猶織長安貴人金屋嬌琉璃屏下方偃息楊國忠事穿忩入幕兒女笑喚作楊花元不識明珠照乗月半夜秋水連雲天一色翻縞新詩出退之撒鹽戲語欺安石一寒最憐東郭士履穿踵決行不得自喜猶為孔子徒且學顔淵食炊墨適得滷蛤頗佳遣餉菊坡因記曽作蛤子詩有文身呉太伯緘口魯銅人之句戲綴前語代簡文身太伯甘斥鹵緘口銅人舌微吐借資墨客富濡沫鹵乃墨魚之瀋骨醉脣香登燕俎半熟含酒老饕賦此翁僅可闖堂戸斑斑雋永帶神液入室真味翁未覩菊坡風裁黄豫章如食蝤蛑江珧柱盤餐盡廢太瘦生格逺調髙自清苦子蛤遣汝到眉案努力去為酒中虎諺稱海醋鹹者為捉酒虎末下鹽豉有何好猶侣蓴羮傲傖父海之介夫此小兒雞肋見笑楊徳祖前身曽作水解仙飛入珠宫飲甘露能令齒吻䇿餘烈一鼎松風漱寒乳閒中口占數絶眼欲觀書身欲眠斜拖黄巻曲肱邊不須身眼爭然否試待醒來問孝先右觀書困甚雨多愁麥又憂苗不雨還憂旱火驕憂國浪愁端自苦老天那肯病湯堯右連雨解悶杏桃結子已成翁稚綠中間著耄紅階藥元來如許夀麥秋天氣露春工右濃緑中見芍藥一朶見説烏蜂不採花羣飛啄蜜喙如鴉雖然冗食真堪汰笑語園丁且放衙右園丁去烏蜂春魚潮罷捉洋山下水艚船縮手還海若想應饕更甚飽鮮無復到人間右海魚絶少安晚堂集巻八欽定四庫全書
