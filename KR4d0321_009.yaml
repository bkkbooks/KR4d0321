body:
  text: 安晚堂集卷九宋鄭清之撰林治中鄭廣文以詩來遣魯酒報聘拙語輔行長公本喜飲半入野人腹南洲春夢婆亦復開醉目尚想晉流麗龞飲更升木興來索老兵誰謂酌可獨我亦愛客至陶巾時一漉雖有彭澤田種秫苦不足頗因病斷遣瓢棄尚餘緑豈無大雅朋來伴離騷讀廣文粲簷花和靖峙修竹交情如酎醇秀句喜心沃觴政嘗卜夜談闈屢更僕胡為闊宇芝但憶頺山玉聊爾遣書瓻安得洗愁斛昔誇聖人中今愧平原督今歲家釀殊未佳杯手助螯持車涎笑逢麴青州豈烏有白衣問黄菊如臯應解顔對飲頗勝俗梅聖俞詩獨坐與婦飲頗勝俗客對何時赤壁游匏樽笑相屬欲歌鹿鳴三正苦龜藏六飲肯遺公榮雨煩過御叔忻聞麥兩岐况有魚百族小卻揖二豪觥船倒醽醁謝玉泉君黄伯厚和韻卯飲貪引巵夕食不饜腹松醪灔玉池鬱尊傲黄目歸閒喜攜㓜欣榮對夏木頗笑屈原醒寧甘馬周獨詩筒發豪思江月欲戲漉毎賡北海詠未羨西隣足槽規長吉紅蟻玩杜陵緑醉鄉擬續記書眼瞭可讀時康萬戸春興到七賢竹筵虛艶姬舞面想宫嬪沃别腸驅藥使健筆命騷僕居然得良朋清辭瀉壺玉習池可聨乗步兵有餘斛步兵厨有酒三百斛誰能酒限拘强效八州督今年小麥好豈屑官廩麴嘉節迫蒲艾早計數茰菊客中真有佳眼前喜無俗賦殷金石聲光粲牛斗屬句在後三三人誰賽六六試編諸賢詩第以伯仲叔共成杜康傳更聚山中族萬事付亡何乾坤一杯醁諸君和篇摩壘致師不容閉壁再繹前韻平生周伯仁耿耿空洞腹翛然猿鶴姿豈辨鳩鷹目僕射不解事居士偶題木種柳僅成五樂園秪可獨皓首愧商隠湛恩霑漢漉城府百無有丘壑一已足詎省醉裙紅安識墜樓緑生經未渠諳酒頌聊喜讀耳熱聞秦聲浪謂肉勝竹髙陽有勍者盛氣如曲沃直須殿上飲撫牀徑呼僕競看椀揮金幾欲斗撞玉方丈食萬錢娉婷珠一斛豈復堪束帶靡從揖郡督耆壽祝老饕嘉名艶春麴乃知梁州萄大勝伯始菊相逢作青眼洗去爾許俗泠然曲寡和尚有騎能屬元和一漁翁喜共學士六吳歈間雅奏楚優效孫叔石鼎夜未央春空雲已族何當一㑹期清驩溢寒醁邴原解劇飲雅名稱龍腹季倫殺為嬉席妓敢嗔目有酒何容辭恐射蔣濟木但當攜酒去名花賞幽獨年秫未足了孔羣聖米猶可漉杜悰愛屐憐猩魂奪巵笑蛇足桂漿有餘芳桑落見重緑諫逺衢尊投法置酺飲讀籌觥進蔌肴流觴屏絲竹未憂瓶罌罄但費􅓢盥沃勝事在園林家務付兒僕陶淵明傳釀羔截肪乳炰鳳泣脂玉鍊句丹九轉摛文泉萬斛競詆酒中賢祗堪帳下督穿幘俯前案障面厭方麴楊諳語魯漫漢事吹不落眼花樂天詩歸去來籬菊華胥國遨遊無懐氏風俗登詩壇爭長破愁城相屬二簋用坎四三客敬需六共樂時方清誰言世之叔相從孟公座寧别輔氏族謂鄭廣文也一笑祝諸賢行釂天家醁今内醖上尊扁以醽醁再和戲黄玉泉黄公辭酒壚經笥捧便腹讀書飢鳶聲了了崇文目陂澄萬頃波巢寄一枝木戲題百篇富自笑孤館獨轍涸聊相濡神液未容漉嘯歌匪彈劒狷隘殊躄足文織犧尊黄句絃綺琴緑不見蠏杯持徒費爾雅讀坐對罌卧墻空有葉暎竹枯腸但茶捜燥吻遲去聲膏沃主人如馬瘦酒使欠猩僕封溪令事思折酤媪劵欲訪義漿玉喟兹鯨吸量眇矣龍驤斛靈根日灌溉詩課自程督試當閲醫經薄釀借神麴共醉靈均絲未問長房菊飲興非有期衣曬寧免俗杯勺雖不勝嘔泄聽隨屬嬾疊陽闗三肯競梟博六不飲但麥豆頗勝劉文叔醉騎黄犢孫歸玩墨君族子為評酒名擬號安晚醁謝葺芷和韻無詩不言酒荆公謂李白無一詩不言酒作賦真誑腹未破公子慳況與佳人目壯心思擊壺聖杯賡啄木樂天啄木曲不如飲此神聖杯袖想胡旋雙糚記摇手獨見陳陶獨摇手行賓筵乏酬獻醴齊催泲漉禰衡辦撾鼓元崇方病足曾無列屋粉空韻梳鬟緑百篇摘仙詠十軸蒙溪讀見顧雲池陽醉歌有美建安璩競爽淇園竹芒端寒燠轉胷次古今沃卧甕嗤舍郎祭酒可令僕漢僕射中興改祭酒時陳南北洗頗醉東西玉雖微醖五斗端有才一斛詩壇長齊盟筆陣嚴總督方將喝銀雲未肯平封麴李賀酒酣喝月使到行銀雲櫛櫛瑶殿月陸龜䝉中酒賦拔酒樹平封麴宫宴看傳柑帝歌須和菊徳宗作黄菊歌翰林學士韋綬奉和牛心固異撰犢鼻且同俗尊酒日相逢我歌君為屬歡期踐三五釀頃十五六樂府庾信對酒人生一百年歡笑惟三五王績有田十六頃悉以釀酒酣暢嗟阮修飲狂謝裴叔裴叔則語石崇云飲人以狂藥責人以正禮窪尊留古製長勺分魯族居然同老襟淺斟醽水醁湘東有醽水故酒得名謝鄭廣文和韻鱣堂心醉經精神應滿腹温飽無所志飲食不以目温公謂今人以耳而衣以目而食説詩稱解頤善問待攻木頗愁百斛量孔庭惟立獨俎豆答衞問筐瓷欠鄒漉見鄒陽酒賦曽子非養口漆園且尊足時於清夜分酌以翠勺緑緑尊翠勺為君斟酌聊澆磊磈胷不廢吾伊讀每篇亦作句來詩毎篇必有亦作語如對紀書竹相逢蓋初傾一别桑重沃融尊慚坐滿魯餽疎拜僕衞生不自寳抑首親患玉囊無䛕墓金米乏佳傳斛㕑煙爨人凊蔬課園夫督粟缾收秫田黍釀用陰麴解同杜陵襟期醉昌黎菊赤手當縛莵來詩有白戰之語白眼漫嗔俗莊虛左氏宴觴肯西子屬坡賦屬此觴於西子酒債負尋常㑹期遭百六要須中聖賢庶以展伯叔謂宗盟也醉入無功鄉醒豈屈原族漢徙屈昭景大族岸幘一笑粲共賦醽酒醁晉張載有醽酒賦雨中即事簡二友怒蛙頻作灌夫罵老鸛唯聞莊舄吟麥熟只應呼快活林間欠此一聲禽右一舉頭但覺雲頭闇移脚何曽雨脚乾衣袷未便時衣褐薄寒渾作晩秋看右二鳩能喚雨復呼晴日日長從屋角鳴晴雨不應闗汝事强饒唇舌效君卿右三五月炎天正及時輕絲扇子未曽持殷勤寄語班姬道只恐秋深却要伊右四蘀龍厭俗託孫兒隣竹過墻隔砌相過人不知借宅敲門太多事胡牀竟日對漪漪右五鶯聲求友亂繅車兀坐翻思二客佳乞得晩晴紅照水南坡東畔月侵階右六客有誦袁䝉齋得雨酬倡之什輒賡原韻志喜也呈虛齋使君雷伯四月瘖無聲鳴鳩呼婦鳬浴晴星如撒沙燈吐紅羲和駕鞭乗赤明稚秧針水未入種秀麥浪畦猶督耕香車不動百龍蟄轉漉如織千蛇横愛民太守心語口瘨我以旱寧無生川靈有知龜亦許異物蜿蜒歸掌撫一雨果從方寸來此念端誠本天與但看父老歌豐年不用兒童學皇舞弭灾肯效欒巴噀哺民無異紫芝乳一年事在阿堵中四封笑溢迎門語我州瀦野同淮徐公方有意六輔渠上天下澤鍾惠施千里波及皆君餘䝉齋詩成虚齋和我樂賦之如遂初對坐聫珠飽官粟但有歡喜無欷歔秪今快續二賢詠不須乞米與顔書又媧石補天玻璃聲遇坎為雨離為晴金烏玉兎旁午出百二十官稱常明下土臣敢再拜問誰主風雨催民耕天江津河尾北見玉井水漿參左横胡為湯旱龜土坼胡為堯水魚頭生孰令赤地星丈許吭扼雷公仍背撫孰令河鼓塞銀潢勺水線流不輕與孰令巻舌自張翕孰令天雞自飛舞雲師族聚曷遽散電母兒號奚不乳黒豬渡河去無迹蒼龍銜珠噤弗語朱鳥崛强王偃徐烏龜縮頸老沮渠夫君牋天帝馮怒旱魃磔死不問餘天街清潤聫璧珠不為乾封為太初一雨三日誰力歟更唱迭和忘欷歔歸之太守不肯有欵乃聊代志喜書又豢龍作醢龍呑聲天公憒憒迷雨晴玉脂泣烹足媚嫵苦酒五色生光明龍雖神物畏饞吻攜朋去作天田耕稚禾婉婉魚薧立髙原庚庚龜兆横漢家燮調豈無術陰陽縱閉歸董生我貧自笑一瓢許闕瓶粟屢空慚釜與彭澤從無種秫資沂水聊助詠雩舞頗怪吹雲讀風訟浪愁淅米繙危語清時何事𢎞羊烹善政端無寗虎乳仁人拯溺非姑徐急挽天漢如决渠我知造物識君意十日一雨焉取餘願君展此作霖手蘇民旱徙扶黄初在在京坻賦髙廩坐令歌賦笑欷歔病坡作計羮玉糝辟穀寧羨黄石書湖上口占賣葑千艘底處藏媧天濯熱卧湖光山雲既雨猶相逐水草無花亦自香野徑徧穿人借問僧茶旋㸃客先嘗翻思舉世趨炎者誰識蘋風五月涼戲續前韻簡幕掾林治中梅霖妬日强遮藏西雨東邊漏隟光黄口禽鳴應乳臭白花梔坼似衙香排根荷出憐嵇紹遯迹蓴肥哂孟嘗浚湖之後荷蓴間有在者閒處便成清境界底須沂水羨雩涼煑白酒送林治中長門思渴薦寒泉浪讀松醪桂酒篇數米釀來成玉液傳家方秘出金川白飛瓊斚應歸重紅滴珠槽敢忘前聊遣朋壺共一笑平分風月晩涼天偶成呈林鄭二友兩絶人才百年能幾見俗子一揖已累人元温亦知有此客徳操未省誰為賓聲名谷口我宗秀風調西湖我輩人自是山巖著不得天敎蹔此伴閒身安晚堂集卷九欽定四庫全書
