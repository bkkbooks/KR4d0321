body:
  text: 安晚堂集卷十宋鄭清之撰紹定閩寇平上功省府黃伯厚載與焉余時在政事堂趙用甫掾西曹力言此文墨士請官以左選既而賞戾法迄授武階去歲戊戌用甫帥鄞乃來為閫屬余浪跡湖山歲餘始一見稍稔接觴詠亹亹迫人間及前事有見晚恨余與之酒曰一文資直慁子然以人廢法雖相知如今日亦弗敢則笑而不怨赴調行在所贈以君莫愁之歌君莫愁君莫愁不龜澼絖能封侯君莫愁君莫愁腰六相印一敝裘看渠涎顙與躄足千金信矣壺中流荻花江月正佳耳青衫浪泣琵琶舟短衣楚製乃翁喜未必挽弓右丁字貂蟬本是侍臣冠有時出自兜鍪裏雖然萬戶將軍臂夜逢醉尉頭搶地賣薪愚婦輕買臣不信讀書有奇事世間衆萬無定容桃笙木棊唯所逢秋來桂菊黃金叢千機錦繡開芙蓉西風也解作富貴豈必桃李專春風得時失據自甘苦姑置是事天夢夢君莫愁君莫愁雙手試捫舌在否勸君勤買西湖船打篷疏雨旗亭酒家園即事十三首水滿橫塘占曉清蓮腮霞舉葉雲生魚兒富貴真難比翠蓋紅糚擁隊行右一新竹地肥方怒長幽花晚發自欣榮飛來野蝶多情思不逐蜻蜓㸃水輕右二池荷岸竹閟寒清肱枕欹眠夢欲成珍重西鄰知好事隔河送過讀書聲右三千巖萬壑自秋春靜處觀山能幾人叠得假山人競看世間宜假不宜真右四緑陰樂去聲靜未號蟬藕葉扶嬌泛水眠輸殺蜂屯深閉壁峙糧宿飽蜜中邊右五侏儒飽愧東方朔嫗母呼回郭舍人博局由來更勝負雉盧那復較疏親右六早作南風午北風暄涼翻手雨無蹤田翁舉似霖霪日腳踏鳴車笑殺儂右七靑帶環生繚岸青葉間蟲篆學陽冰墨池文冡非難化芝菌從教子厚蒸右八樹底鳴鳩相唯諾花間飛蝶自綢繆二蟲得失聊堪笑鴻鵠誰能問奕秋右九遊魚繞石日千里反舌鳴聲已百能老鶴易飢增廩稍乳雞勤哺領孫曾右十客有可人君子竹書無闕大王風此風此竹堪誰共著得茶經桑苧翁右十一人心似鐵爐猶在世事如棋路不移閒著目光牛背上英雄千古竟兒嬉右十二老紅擬占春光住嫩緑枝頭更嬌妬隨風宛轉未肯落猶作霓裳羽衣舞右十三又樂天心不憂作德心逸休雞蟲笑杜甫蝴蝶夢莊周苛政猛於虎蹊田奪之牛書傳亂人意周易在牀頭詩别可齊陳制置移鎮吳門恭惟上明聖宵旰親政初朝有經濟儒野無薄笨車我獨何因緣濫持鈞與樞妄意在人物搜羅到巖墟穆之百函至酬答疲卷舒雖云得梗概詎必相賢愚君時藹廉譽一再登除書公牘恥私謝直語非貢諛尚無赫蹄箋而況雙鯉魚元龍一世豪名下定不虛我歸海之濵偃息田園居生平舊交游相忘付江湖將軍忽打門君書來自吳瓿藁富鴻筆硯銘出龜趺興懷向㵳泬論文逮荒疏自言久愛敬今始通勤渠不為熱翕翕不為暖姝姝云何好尚真敻與世俗殊意者元城賢待以涑水迂獸旗畫星壤龍幡開玉符老我嘆蒲柳投閒託枌榆味言喜啖蔗秀句嫌催租的知我輩人調度非轅駒子長固多愛舍菀乃集枯梅花倚瘦竹清芬借敷腴常恐硬黃紙喚歸翔紫廬問君立朝節蹇諤辛毗裾問君治理效所至桐鄉朱正爾澤東履俄然移右扶借留此截鐙來暮彼歌襦譬之絳霄雲來往本自如君亦何心哉此事姑置諸但惜君去我有唱誰和余寒山尚餘雪江闊征帆孤揮毫寫别恨臨風獨躊躇懷可齊簡林鄭二從事可齊嚴冷如古書莊語敢下鉛與朱讀之不厭味有餘簫韶間奏愁爰居文墨政事同機樞照人炯炯懸冰壺昆弟親我同二蘇對牀風雨夜夢俱别來半歲意鬱紆賴有二客能從余或寄可齊雙鯉魚道甫問訊今何如乍晴觀蜂房戲占蜜蜂家計千頭奴日併花課供蜜租粉紅黃白各本色擁腫雙腳尻為車採花歸來不知數一一到門如合繻方春乳房湧金屋子弟分王遣之國廣輪處處成甘州饞口嚌嚅不遺力蜜脾割盡刲蠟膚畢歲辛勤用謀食秋深冬早未見春嗅芳咀華來藻蘋釀成餱糧香滿室日日飽衙知愛君問誰食蜜還主臣阜財富國今何人糟蟛蚏送葺芷月腹一寸能郭索黃流在中自濡殼蝤蛑可自丈人行螃蟹視之師長伯二眸挺出勝怒蛙八跪前驅非屈蠖笑令樊噲自橫行何用吕布須急縛餔糟啜醨乃吾味嚼齒穿齦未渠惡屬饜秪覺一匡勝效美不辭雙距落蔡謨但記尊足存孫卿不悟鐵成錯漫誇右手亦持螯水中之怒無乃虐梁王葅醢猶至今千古吁嗟漢恩薄玉柱江瑤酒半酣銀絲鯽魚膾新斫此非不足君所邪斶顧居貧未能學蟲魚瑣碎熟爾雅麯坐逢之三距躍太真小物自足佳葺芷一笑為飛白再和且答索飲語海塗之人暗摸索如龜自遮聊以殼沈湘雖避屈三閭斷髮奈逢吳太伯周官自詭蠯螺蚳羲經敢並龍蛇蠖嫗妃投甕甘骨醉俗以羣雌巨掩為佳舌味無心寧法縛黃詩未足助盤飱吳稻詎能為歲惡尊前介士尚錚錚海底漫郎終落落帛聲試聽響犀瓠玉指為渠代金錯掩羣而取僅遺小誰念坑降秦政虐二螯六跪冒族姓穴居頗笑鄰之薄縱令臏足亦可喜中有妙解未應斫賸擬新篘問揚字先賦南烹仰韓學蠔山馬甲不易致岸下紫鱗方牣躍主人鸛鶴真耐痛笑許子彭如水白諺語有鸛鶴日至水濱羣蟹相與捕魚蝦飼之以為常一日鸛鶴語蟹曰施而不報非禮也吾喬木巢成亦可延客能從吾乎蟹以無翼辭鸛鶴曰此易耳子以兩距鉗我足我爾身也蟹悅從之一飛戾空蟹懼鉗益力鸛鶴痛怒罵之蟹笑曰作主人乃爾痛耶鄭德言暫館于别墅我如杜甫逢王翰君似梁鴻領孟光花竹自慚非獨樂杼機聊善聽鄰墻賦成寧笑老傖父甕熟定容同舍郎他日楊花飛燕子可能長記陸宣莊安晚偶成五物中間著一翁園㕓隨分可支笻章施采服花糚露戛擊鳴球竹嘯風踈種密栽觀木漸淺流深浚養泉䝉眼前丘壑無佳句自哂詩腸苦未窮和鄭制幹遷居帝遣夫君侍玉除籋雲飛上駕龍駒兵談暫此棲油幕荷隰居然見子都風牖喜便鴻案舉月臺長對兔輪孤孟嘗幸舍非吾事徒愧荀林為送孥和鄭制幹謝借居且惠朋樽醉螯詩平生愛山林里居想王屋孤月自無朋斷雲曾不族詎知莊遵市倏有賈誼卜西河就索居漆園問尊足翟門羅可去軻宅仁已熟似聞結駟多每見後騎屬魯臺時遣餽監侯已發粟競歡王儉蓮肯問顔子粥家貧願鄰富蒹葭欣倚玉頗容滑稽叟來簉堂上燭猶能辨絲簧漸近不如竹濯醪慁兵醖庸行參聖讀願為善頌禱既醉備五福謀婦擬提壺敲門驚啄木持螯兩從事來就桑下宿美味均適口雙明喜增目命駕匪千里星言愧不夙聫句乏追韓補詩聊繼束終當效樂天駱馬為酒鬻題雪竇千丈巖並海危峰駕六鼇招提深處緑周遭樛松直上睡龍起怒濤飛來風虎嘷坐向亭空雲作伴待看身與月爭髙山靈意我酬清賞為酌冰泉讀楚騷林治中近有捕虎之役調以拙詩豺狼當道實堪嗔就乳於莵笑楚臣馮婦下車宜衆說將軍射石見心真渡河應避馮河勇搏獸終歸舞獸仁他日朕虞須命益九官濟濟定相親比以拙詩戲調張籍不知作者已盈軸矣輒和兩韻展也虞朝庶績熙合修厥貢暨熊狸兕容于野雖非地豹澤其文似識時毛革正須供有用血牙安事殺為嬉國僑惠政人誰犯虎聽多應謝子皮虓虎寧如龜有知陸行端自觸危機縛渠吕布還須急驅以王尋漫失威肯使黔驢呈短技直教獵騎合邊圍惡盈詎必分人獸猛獲終擒自衛歸宋人請猛獲于衛石祁子曰天下之惡一也云云衛人歸之圃中問訊梅友老幹疏花有足喜者洗出金灘鎖骨沙種成老樹競槎牙冰霜歷盡肌生玉窗牖寒深影到紗舊歲枝頭新歲景十分好處一分花誰言冷圃惟秋菊春意撩人乃爾邪安晚堂集卷十欽定四庫全書
