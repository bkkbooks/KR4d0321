body:
  text: 安晚堂集卷十二宋鄭清之撰和趙從道賦菜畦春富貴多生菜氣粥魚僧味菜還如好色登戲學挑根和露煮正堪摘稻配香蒸見誠齊詩話芝田不減商山樂蔬食誰言孔色矜孔子見老聃云云去爾驕志與矜色蒲筍秪應維蔌美鏤鍚何必羡韓膺送林教授竹戊戌九月玉壺仙骨産蓬萊客授京璜雋武開曽向西山傳墨印魯直墨以傳千古文章之印好遊東觀籋蘭臺青雲直上輕餘子黑髮誰量未易才側耳韶簫充雅奏願同觀樂詫州來石鼎煎茶午夢醒羊腸怕聽繞車聲剡舟忽至驚安道漢使新招别子卿交誼從君知絶俗凋年如我最關情鳯鸞先路為時瑞肯卜筳篿訴獨清安晚園戲占橫塘雨過水初平浪影窺忩一孔明籬下觸羝五鹿角林間反舌百禽聲柳公權可送行客梅子真能寬渴兵誰道夏園無所有蓮花端可傲張卿九日即事安晚閒身晚更安蛩宵無夢落金鞍通心白髮難為染對面青編儘耐看多謝紫萸占老健喜招黃菊伴秋寒江城借黓生輕暖忽有鳴蛙却為官甕畦籬戶小園林獨鶴相陪省一琴老視官年從實録貧依國息寄橫金每從官庫質錢詩盈弓力猶能寸客值騷醒且枉尋楓葉似知酤令緩漂搖醉臉出墻陰童孫競爽祝雞翁㸃勘凡將句讀中戲指丈兄誇少壯樂天有張丈殷兄詩懶推庚甲問雌雄窮秋對展三更月迥夜傳呼萬竅風逗曉東忩相管領舉頭灔灔日車紅題偃溪聞長老堯民擊壤圗炊煙萬井著僧居人在康衢畫不如寄語偃溪烘淡墨圗中添我一柴車謝林治中訪别覺際庵野服芒鞋踏蘚斑千峯約飭整雲鬟山行陡覺精神健老去惟貪耳目閒步武來尋僧舍舊話言應想夜窗間錢湖難買歸鞍駐料得春衫憶素蠻正月晦夕夢中作偈覺但記其首兩句遂于枕上足之録呈慧上人是身本虛妄覔主了無得誰知日用間顛倒由六賊茫茫前後際生滅在空色賦去主人歸渾家不相識因筆記賊入空室頌平生一片癡妄意室中物自言富可待到了貧徹骨一宵入人家百寶認髣佛揀得真金身明處是泥佛乙巳三月出湖口占幾朝花片落書奩未信春光已屬厭猛省清明今日事家家青柳壓朱櫩又曉日殷勤為著鞭微風逐旋約輕煙東皇勝景渾如舊西子粧濃喜近前檻外客山今對展禊時朋酒占初筵十年重訪蘇堤柳總付春光入畫船到龍井寺竹門斜倚酒家帘石路髙低記水簾炙背老農驚傴僂乘肩癡女笑窺覘數羝人立攀籬落一蝶兒嬉掠繖簷欵約朋從歸去路馬頭應有月纎纎山圍古寺緑周遭一閣軒騰面勢髙爐篆得薌抽露穟石泉借茗作雲濤風流二老歸靈鷲筆墨千年續楚騷拙語留題罥蛛壁暗中摸索愧劉曹底忙不肯訪禪林山寺何曽避客深奇石韻髙非令色老松皮脫見真心簷牙徇鐸關幽事溪曲無絃出妙音拂拭少游碑好在姓名曽記落碑陰十里輕軒憩佛廬夢身差記蝶蘧蘧伊蒲巧作魚蝦樣矮筍新鑱繭栗株暫到欲陪僧夏靜等間生怕俗塵汚計然老去翻多事空挽西施向五湖旌德觀瀛丈移從弱水間君恩泮奐得躋攀茗香壺酒成三事巾褐枝笻占獨班境勝亦能充道勝官閒何似在家閒𤣥都猶有桃花在更向西湖訪好山緑簑青笠慣菰蒲錯認東湖處士居舟尾笑迎車後客渡頭催買網中魚水程趣戍半規日山意論交千卷書歸去重樓試凝望恍曾雲氣矗凌虛又半生東甬數間屋一日西湖十首詩回首風光少年客春山擁翠作蛾眉賜第登樓避俗懶成癖登樓睡失魔忘機鷗自下開檻蝶相過髙處景差勝靜中春更多君恩何以報歸夢欲如何又桃李漫山不是春紛紛蜂蝶趂遊人梅花已帶春歸了分付垂楊浥路塵病思歸心走兔迒自嗤幻境未渠忘并州便作咸陽看設若桑乾亦故鄉觀王導傳作江東老子惠之和九錫牛車愠蔡婆不殺伯仁君信否淡然推分意如何閒中偶成病覺身名小閒知日月忙篆香雲四合盆篠竹千章慧性乾成障愁懷弱未張何如莊宇定虛室自天光春過日初永睡餘意未忺露花心翼翼風葉喜沾沾殿後蜂尋穴懷歸燕語簷垂楊在何處落絮㸃疏簾孟童子中異科而還來訪余於行都賜第輒贈以詩在昔昌黎公序贈張童子獨出超等夷芳名駕青史君門藹世勛敻軼西平李宋杜方同休彪炳見孩稚天庭插犀角星眸炯秋水誦書如焦琴髙下涵角祉朱門共駭聽洗此箏笛耳老翁欲笞兒眼看拾青紫一朝聞九關賚豫出周篚我朝晏與楊炳炳貴名起願子志逺大勤學踵前軌家尊我相知作詩贈歸騎東湖送藕與葺芷草木誰無知葉落能糞本榮枯遞乘除苗實自穮蓘東湖百頃蓮夏日傲趙盾州家浚河渠獮剃甚藝墾長身萬柄荷髦梗付鍤畚寒煙尉青鏡時有白浪輥水解育仙骨根著泉源混外乾乃中腴下益寧上損淤泥胎玲瓏多節竅混沌園丁亦善沒擘波沸魴鱒象株忽仰浮登岸如衮衮誰知絳縣塗可試平叔粉名非玉井船實過秋蘭畹肴蔌雜燕豆葅菜補中壼交梨能養生諼草亦忘忿空言出好事孰與津燥吻贈君擬條冰差勝羞藻蕰送新薑與葺芷仲尼胡不撤薑食損智深譏藏戲劇將以愚民豈其然半山失喜為動色拗執誰解鐫此老一時鑿說契胸臆我疑諗之神農書增壯胃腑良有力吕令音商其味辛調芼魚蔬蘖香稷方冬沃土培其根隴畦分封隨壤息長鬚視苗勤獻新先時劚取奮鉏棘青株斯拔薤本重紅萁半露菱包側駢指驚看産漆園胝足疑為導積石欲搗芳辛入虀臼為憐膚理傲金狄僕命薺荼涴詩雅肩差梅桂班內則笑加束縛代書鯉持助饔庖鱠銀鯽旱年宜薑諺有之今年雨多生意嗇小摘酸寒類甲菜大何嬰冒期膝席公羊穀梁汝往哉反音一笑當勿劾稗官有記公羊榖梁並出一人之手其姓則姜蓋四字反切即姜字也山間録拙作求教葺芷俚語將命笑擲幸甚老我愧不學無以祛六蔽短綆赴修汲深淺忘厲揭每逢撲凸篇如對葛答謎敵壘或致師何以禦柴曵書林倦回旋筆徑宜睥睨獨自搔背癢誰與解襪繫誤墨拙成蠅飲醯癡聚蚋器成多苦窳草創類茅蕝未善文心雕曷助葵足衛樂只正始音盡發文冡瘞古意窺九嶷詞源決三澨英風韻風雅噩噩規誥誓精剛拏健鶻妥帖律狂猘解注卑蟲魚獻納笑蝦䱥讀檄頭愈疾聽語麋著箄風髙補釣臺天朗摘蘭禊合止按商角刮磨出廉鋭妙指曲不傳奪胎骨可蛻神針如運斤拆屋去眼翳又如大醫王刲胄滌淫滯萬象困搜討瑤金拔昆麗司文當執衡却掃甘擁篲空山闊游從思君願言嚏蕪詞薦藜藿香芼待薑桂翳桑急壺飱毋為答飯毳書西湖雷峯雲講主草書寶慶丁亥閏夏余以執事出郊歸塗午漏下逋暑于雷峯老師肅客乃二十年前所識雲上人也因索草書縱觀成古風十韻以贈雲師一生耽聖草銀鐵蟠空覷天巧老來逸氣未全平筆底鋒鋩猶獨掃開關勇士爭赴敵劒㦸弓戈奮相繚睡龍决起求頷珠劃木㧓巖紛怒爪風雷喧豗撼坤軸飛電交橫印清沼忽然天宇變空澄千丈孤峯立寒峭張顛驚號智永泣剝筋椎髓為君飽恨豫不習草書訣九轉枯腸秪自攪雲師雲師汝誠能春蚓秋蛇幾時了何如認取主人翁破衲䝉頭紙忩曉送黃伯厚入廣五行在天地惟水明且清如何南中泉乃獨以貪名水號黑與弱淖汩稱濁涇彼皆有其實所以得此聲山川日秀發九疑羅翠屏扶輿産清淑丹砂銀石英有泉出其間泠然堪濯纓正坐貪夫纍土炭涴玉冰桓山以魋故至今人羞稱柳子愚其溪百世相因仍有如此白水好貪豈其情我欲招夷齊稷之南山汀一洗萬古貪涌雪歸東溟夫君素潔已贈以貪泉銘送繼一郭處士聖君如堯舜豈無巢與由計然亦何慕五湖一扁舟之人久不作側席思巖幽嘗聞鹿何君清芬徹凝旒重華錫嘉號見一光林丘誰謂雅道息競風日悠悠脫冠掛神武有士歸東州笑將金閨籍猛博處士裘鈞天為開顔曰此夷逸儔大書繼一字虹光屬奎婁宸章軼麟衮正聲出天球清名奬靜退下視古素侯睿謨廣先憲姱節追前修況今輯衆雋丞弼登虞周明時樂閒暇出處自不侔赤城宅仙子登陸方蓬洲君歸訪司馬坐忘春與秋方瞳照緑髮戲轉黃河流煙霧肅逋客隱者應輟耰欵乃輔行色春風生柁樓安晚堂集卷十二欽定四庫全書
