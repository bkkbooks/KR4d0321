body:
  text: 安晩堂集巻十一宋鄭清之撰謝徐德夫右司和御製賜詩直道何曽較尺尋昔賢垂範到斯今臯謨勉勉歌元首説誨年年沃朕心幸遇千齡開聖治頃塵三事愧宵箴奎文衣被真難報盥誦新詩愛助深朅來林下破天慳要使明時見一閒齒屐印苔春縱步頸壺蒸粟晩加餐夢魂飛到味書閣世路牢封函谷關翻笑醉翁猶未醉黄金白鬢詫腰環徳夫家有味書閣和林治中雪詩五首擘天滕六勇如貔移下瓊臺撲凸奇老盡青山真是幻從渠白戰更無詩憑䦨且喜明雙目嘶騎寧愁到十眉謂撤戍也坡詩長安畫手開十眉云云中有漁陽胡騎嘶羔酒不妨敲竹韻園林正好樂清時右一兒嬉犯凍搦文貔怒眦張唇狀崛奇圗得形模規婦笑絶憐冷落賦翁詩幕談多暇堪娯目喜色排寒為上眉頗念袁安正髙卧柮柴煨芋了年時右二鹽虎模糊懵豹貔豹一作虎玉峯髙並自多奇春先北苑供花事夜入西淮奏雅詩銀闕勢増開雉尾賀班香近列蛾眉看君來歲賡酬筆移在儀曹進表時右三白旄麾徧牧郊貔羽扇分飛更出奇凍裂弓鍪元濟縛嚙殘氈毳子卿詩蘆花夜月凝湓口梅玉春風侈蜀眉坡雪詩有玉梅春之句一幅溪藤知幾返鏤冰冷語不驚時右四貙貗甝狒貃貛貔獵騎漫山伏正奇􅏿手草成熊館賦掩羣驅入兎置詩獸奔駭類淮淝口狐媚讙催虢國眉滕六倚渠真誤事大寒不出是知時首句見爾雅釋獸連文右五因㑹古外切來詩再賡元韻組練横陳壯士貔想因舞羽去窮奇千山白髪存公道十日清吟費老詩待伴易銷春有脚交光最勝日如眉只愁無著梅花處東絹平章付伯時續詩之寵依韻以謝莫捜險韻續貒貔雲景須知雪後奇日絢寒光莊淨界梅將真色薦新詩試敲折竹煎茶舌旋覔遥岑出黛眉油幙輸君談笑樂聖杯正是一中時村邊以湯婆樣惠示與詩俱來依元韻惠中秀外更清便婭姹嬌羞二八年無奈畏塗生袵席寧敎寒夜折冰綿遣來勣嫗知君狀擬伴涪翁到曉天只恐甎花陶學士風流未了續膠縁再和村邊解嘲閒身惟向靜中便暮景侵尋絳縣年未解真精昏黙黙且觀𤣥牝息綿綿温柔鄉裏誰能老冷淡生涯别有天笑撫脚婆為法喜漆園何必問經縁縁督以為經暖足番君老更便摩挱笑問阿婆年聊吟夜月移花影肯向春風逐柳綿自有散花居丈室何妨姹女共壺天鉛華列屋諸君事乞去聲與寒梅了世縁造化真機動靜便誰云巧智可同年藍田日暖煙生玉閩嶠霜濃木有綿萬象為春皆是物一花不實豈其天吾身太極元同運陽長陰消在所縁和葺芷筍詩我貧毎笑齊之斶晚食雖甘未忘肉梅肥尚餘風折緑溟涬餐英命騷僕藩籬剟彼羝角觸送似玉堂如楚束惡詩聊賦徐凝瀑妙句飛來漱鳴玉曽無導吏隨賈餗坐遣跛奚委葵菽茁芽勤視縁坡竹期飫伯仁空洞腹書腸膏腥士之辱得魚不敢餉羊續要知菜味勝山谷步趨强顔髮曲局盤有美茹無不足陋矣王芻箋衞澳贈許石田為僧平明對鏡良獨難子能脱屣彈指間戲視此身如髦蠻冠巾擺落逃繻關千金强弩一笑彎萬錢買盡江南山厭渠世路車輪殷赤脚健倒苔痕斑參寥佛印若是班江湖風月不汝慳汝狂方醒衆所讙我獨見之為三嘆辨詰孔釋語可刪白雲深處輸君閒和敬禪師茶偈飯罷茶來手接時箇中日日是真機建溪顧渚君休問冷暖如魚只自知睡蛇纒繞黒甜時棒喝全提落鈍機管取一甌先著到三更日出有誰知魚皷纔休客至時摸頭元是最先機不須吸盡西江水一滴曹溪味便知贈育王堪笑翁問訊瞿曇老比丘靈山何似雪山頭笑翁底事真堪笑面似靴皮笑未休蔬圃活計園蔬日日新杜陵差慰婦長貧旱薑水芋年時熟春薤秋菘意味真畦甕䞉分三伏雨露根常占百花晨荷鋤未省勤耕稼猶愧師門學圃人和林倅賦郡守隨車雨旌車勤雨拂參旗大士圎通現白衣爐穟輕煙方先路雷門急令已宣威為霖賸作西成計書歲誰云大有稀賢守劬躬民國念食言應笑魯臣肥和白雪老禪二偈閲盡恒河水上波聲塵何似泡漚多還師拍板鉗鎚後更唱誰家别調歌簷鐸吟風月半凹黄金布地欠誅茅三更出日真光景大好欽身正笠包靈隠慧上人惠詩為古風以贈貫休齊已唐詩人當時逸氣凌簮紳聲名亹亹逼甫白幽蘭直與梅爭春誰知北面石霜老服勤杖屨皆終身二公所得當葢世英詞傑句風中塵至今傳者以詩重妙處反為詩所湮弄翰戲墨雖佛事炊沙作糗成飢嗔不欲詩工與字巧緒餘能奪道之真心宗一了萬法具辯才飛轉陶家輪君不見阿難多聞及辯慧呪語要敵摩伽神天育二老禪惠示經佛偈答以十詩二老毫端一滴曹喚醒寱語沒忉忉更無慧可安身處作莫當時立得牢右一餘塵明極强分離菩薩如來是阿誰既道本來無一物將何芥子納須彌右二龍宫海藏自分明搕􅩟灘頭一任傾因果若還終不昧正須防作野狐鳴右三書經猶有遮箇在畫佛何曾夢見來玲石玉峰雷雨過梅花昨夜一枝開右四三經已是太多羅州去休休更問婆箇裏幸然無一事何須終日把甎磨右五四十刼來閒坐休忽抛長舌閙藍頭若言面壁為心法瞿老還輸第一籌右六懵懂維摩不二門畧無遺囑付兒孫普賢若匪剛饒舌此事如何更吐呑右七老胡無聖亦無言驀指虛空喚作禪掌血條痕無著處教誰白地患青顛右八般柴運水老龐禪佛法無多在蜜邊餅汝將來還與汝因師交㸃更團圎右九生老年來病已深灸瘢著艾復難禁六根四大原無有何處求師下一鍼右十鄭徳言親覩洛伽觀音相遂依所見繪畫朝夕嚴奉且求賛語敬題其旁具足圎通性一念本昭徹我與信心人是三無差别凢人未見聖如渴以河説佛身忽現前如水印秋月心精自開遮見根匪優劣念中有大士珠瓔百寳結補陁洛伽相在在猶日揭是名為正觀倒想作奇絶稽首圎通尊兹念無起滅非相亦非念不盈復不闕唯然觀自在無眼耳鼻舌拙偈調偃谿上人昌黎先生入山裏大顛牢把數珠子松下經函著淨瓶照管習之飜却水丞郎滿擔江西禪行行勘辯撩天鼻偃谿爛嚼雪忩紙換却舌頭别參起雪忩董寺丞將㫖平讞安晩來訪因舉似偃谿為下一則語佛法方當惡劇時偃谿笑裏袖鉗鎚不教管領千雲衲打徹頭關更問誰簡雪窓董寺丞世路機心走兎迒雪窓一縷不遮藏籋雲梯月真游戲茅舍何曽外玉堂聖賢事業在心槃禹稷顔回豈異觀世故波瀾同起滅姓名千古要清寒山間大風雨晝夜不止聞松聲撼牀戲成拙語漫錄呈葺芷參溪顛風横雨窮山秋樵青弛擔車停輈松聲撼空吼萬牛轟豗勢欲傾不周晨雞扼吭喑且愁百鳥何敢相喧啾恍疑趙壁環諸侯呼聲動地鏘弓矛又疑變化鵾鵬儔垂天鼓翼南溟􅑍或者挽翻河漢流電飛霆擊龍蛇虬不然火烈陸渾丘天跳地踔啼熊猴狂吞狠吐山裂鳩大音奔騰怒相投夢中驚迴仙枕游分明夜宿浙江頭三更潮水掀柁樓蒼茫起坐擁黄綢觸屏喚作錢塘舟此身端坐巖之幽如何兩耳不自由乃與喧寂為沈浮影蛇石虎以妄求世間萬事浪喜憂大學能定心逸休疾雷破柱方夷猶直須養浩師孟鄒風止韻作商聲謳和複岫庵賡醻之什勝地來休沐山程懶忘前草堂新杜曲詩格舊臨川客乗千珠履翁琴百澗泉參尋幽路滑空想石頭禪大雅千巖秀清標萬玉前醉扶有宗武屬和得師川境勝堪耡月詩香可釀泉竹林風度在枯坐笑僧禪安晚堂集巻十一欽定四庫全書安晩堂集巻十一宋鄭清之撰謝徐德夫右司和御製賜詩直道何曽較尺尋昔賢垂範到斯今臯謨勉勉歌元首説誨年年沃朕心幸遇千齡開聖治頃塵三事愧宵箴奎文衣被真難報盥誦新詩愛助深朅來林下破天慳要使明時見一閒齒屐印苔春縱步頸壺蒸粟晩加餐夢魂飛到味書閣世路牢封函谷關翻笑醉翁猶未醉黄金白鬢詫腰環徳夫家有味書閣和林治中雪詩五首擘天滕六勇如貔移下瓊臺撲凸奇老盡青山真是幻從渠白戰更無詩憑䦨且喜明雙目嘶騎寧愁到十眉謂撤戍也坡詩長安畫手開十眉云云中有漁陽胡騎嘶羔酒不妨敲竹韻園林正好樂清時右一兒嬉犯凍搦文貔怒眦張唇狀崛奇圗得形模規婦笑絶憐冷落賦翁詩幕談多暇堪娯目喜色排寒為上眉頗念袁安正髙卧柮柴煨芋了年時右二鹽虎模糊懵豹貔豹一作虎玉峯髙並自多奇春先北苑供花事夜入西淮奏雅詩銀闕勢増開雉尾賀班香近列蛾眉看君來歲賡酬筆移在儀曹進表時右三白旄麾徧牧郊貔羽扇分飛更出奇凍裂弓鍪元濟縛嚙殘氈毳子卿詩蘆花夜月凝湓口梅玉春風侈蜀眉坡雪詩有玉梅春之句一幅溪藤知幾返鏤冰冷語不驚時右四貙貗甝狒貃貛貔獵騎漫山伏正奇􅏿手草成熊館賦掩羣驅入兎置詩獸奔駭類淮淝口狐媚讙催虢國眉滕六倚渠真誤事大寒不出是知時首句見爾雅釋獸連文右五因㑹古外切來詩再賡元韻組練横陳壯士貔想因舞羽去窮奇千山白髪存公道十日清吟費老詩待伴易銷春有脚交光最勝日如眉只愁無著梅花處東絹平章付伯時續詩之寵依韻以謝莫捜險韻續貒貔雲景須知雪後奇日絢寒光莊淨界梅將真色薦新詩試敲折竹煎茶舌旋覔遥岑出黛眉油幙輸君談笑樂聖杯正是一中時村邊以湯婆樣惠示與詩俱來依元韻惠中秀外更清便婭姹嬌羞二八年無奈畏塗生袵席寧敎寒夜折冰綿遣來勣嫗知君狀擬伴涪翁到曉天只恐甎花陶學士風流未了續膠縁再和村邊解嘲閒身惟向靜中便暮景侵尋絳縣年未解真精昏黙黙且觀𤣥牝息綿綿温柔鄉裏誰能老冷淡生涯别有天笑撫脚婆為法喜漆園何必問經縁縁督以為經暖足番君老更便摩挱笑問阿婆年聊吟夜月移花影肯向春風逐柳綿自有散花居丈室何妨姹女共壺天鉛華列屋諸君事乞去聲與寒梅了世縁造化真機動靜便誰云巧智可同年藍田日暖煙生玉閩嶠霜濃木有綿萬象為春皆是物一花不實豈其天吾身太極元同運陽長陰消在所縁和葺芷筍詩我貧毎笑齊之斶晚食雖甘未忘肉梅肥尚餘風折緑溟涬餐英命騷僕藩籬剟彼羝角觸送似玉堂如楚束惡詩聊賦徐凝瀑妙句飛來漱鳴玉曽無導吏隨賈餗坐遣跛奚委葵菽茁芽勤視縁坡竹期飫伯仁空洞腹書腸膏腥士之辱得魚不敢餉羊續要知菜味勝山谷步趨强顔髮曲局盤有美茹無不足陋矣王芻箋衞澳贈許石田為僧平明對鏡良獨難子能脱屣彈指間戲視此身如髦蠻冠巾擺落逃繻關千金强弩一笑彎萬錢買盡江南山厭渠世路車輪殷赤脚健倒苔痕斑參寥佛印若是班江湖風月不汝慳汝狂方醒衆所讙我獨見之為三嘆辨詰孔釋語可刪白雲深處輸君閒和敬禪師茶偈飯罷茶來手接時箇中日日是真機建溪顧渚君休問冷暖如魚只自知睡蛇纒繞黒甜時棒喝全提落鈍機管取一甌先著到三更日出有誰知魚皷纔休客至時摸頭元是最先機不須吸盡西江水一滴曹溪味便知贈育王堪笑翁問訊瞿曇老比丘靈山何似雪山頭笑翁底事真堪笑面似靴皮笑未休蔬圃活計園蔬日日新杜陵差慰婦長貧旱薑水芋年時熟春薤秋菘意味真畦甕䞉分三伏雨露根常占百花晨荷鋤未省勤耕稼猶愧師門學圃人和林倅賦郡守隨車雨旌車勤雨拂參旗大士圎通現白衣爐穟輕煙方先路雷門急令已宣威為霖賸作西成計書歲誰云大有稀賢守劬躬民國念食言應笑魯臣肥和白雪老禪二偈閲盡恒河水上波聲塵何似泡漚多還師拍板鉗鎚後更唱誰家别調歌簷鐸吟風月半凹黄金布地欠誅茅三更出日真光景大好欽身正笠包靈隠慧上人惠詩為古風以贈貫休齊已唐詩人當時逸氣凌簮紳聲名亹亹逼甫白幽蘭直與梅爭春誰知北面石霜老服勤杖屨皆終身二公所得當葢世英詞傑句風中塵至今傳者以詩重妙處反為詩所湮弄翰戲墨雖佛事炊沙作糗成飢嗔不欲詩工與字巧緒餘能奪道之真心宗一了萬法具辯才飛轉陶家輪君不見阿難多聞及辯慧呪語要敵摩伽神天育二老禪惠示經佛偈答以十詩二老毫端一滴曹喚醒寱語沒忉忉更無慧可安身處作莫當時立得牢右一餘塵明極强分離菩薩如來是阿誰既道本來無一物將何芥子納須彌右二龍宫海藏自分明搕􅩟灘頭一任傾因果若還終不昧正須防作野狐鳴右三書經猶有遮箇在畫佛何曾夢見來玲石玉峰雷雨過梅花昨夜一枝開右四三經已是太多羅州去休休更問婆箇裏幸然無一事何須終日把甎磨右五四十刼來閒坐休忽抛長舌閙藍頭若言面壁為心法瞿老還輸第一籌右六懵懂維摩不二門畧無遺囑付兒孫普賢若匪剛饒舌此事如何更吐呑右七老胡無聖亦無言驀指虛空喚作禪掌血條痕無著處教誰白地患青顛右八般柴運水老龐禪佛法無多在蜜邊餅汝將來還與汝因師交㸃更團圎右九生老年來病已深灸瘢著艾復難禁六根四大原無有何處求師下一鍼右十鄭徳言親覩洛伽觀音相遂依所見繪畫朝夕嚴奉且求賛語敬題其旁具足圎通性一念本昭徹我與信心人是三無差别凢人未見聖如渴以河説佛身忽現前如水印秋月心精自開遮見根匪優劣念中有大士珠瓔百寳結補陁洛伽相在在猶日揭是名為正觀倒想作奇絶稽首圎通尊兹念無起滅非相亦非念不盈復不闕唯然觀自在無眼耳鼻舌拙偈調偃谿上人昌黎先生入山裏大顛牢把數珠子松下經函著淨瓶照管習之飜却水丞郎滿擔江西禪行行勘辯撩天鼻偃谿爛嚼雪忩紙換却舌頭别參起雪忩董寺丞將㫖平讞安晩來訪因舉似偃谿為下一則語佛法方當惡劇時偃谿笑裏袖鉗鎚不教管領千雲衲打徹頭關更問誰簡雪窓董寺丞世路機心走兎迒雪窓一縷不遮藏籋雲梯月真游戲茅舍何曽外玉堂聖賢事業在心槃禹稷顔回豈異觀世故波瀾同起滅姓名千古要清寒山間大風雨晝夜不止聞松聲撼牀戲成拙語漫錄呈葺芷參溪顛風横雨窮山秋樵青弛擔車停輈松聲撼空吼萬牛轟豗勢欲傾不周晨雞扼吭喑且愁百鳥何敢相喧啾恍疑趙壁環諸侯呼聲動地鏘弓矛又疑變化鵾鵬儔垂天鼓翼南溟􅑍或者挽翻河漢流電飛霆擊龍蛇虬不然火烈陸渾丘天跳地踔啼熊猴狂吞狠吐山裂鳩大音奔騰怒相投夢中驚迴仙枕游分明夜宿浙江頭三更潮水掀柁樓蒼茫起坐擁黄綢觸屏喚作錢塘舟此身端坐巖之幽如何兩耳不自由乃與喧寂為沈浮影蛇石虎以妄求世間萬事浪喜憂大學能定心逸休疾雷破柱方夷猶直須養浩師孟鄒風止韻作商聲謳和複岫庵賡醻之什勝地來休沐山程懶忘前草堂新杜曲詩格舊臨川客乗千珠履翁琴百澗泉參尋幽路滑空想石頭禪大雅千巖秀清標萬玉前醉扶有宗武屬和得師川境勝堪耡月詩香可釀泉竹林風度在枯坐笑僧禪安晚堂集巻十一
